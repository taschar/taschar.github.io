<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Φόρμα επικοινωνίας</title>
</head>

<body>

<link href="contact-form.css" rel="stylesheet">

<div class="fcf-body">

    <div id="fcf-form">
<div class="col-lg-12 text-center">
                    <h2 class="section-heading">Φόρμα Επικοινωνίας</h2>
                    <h3 class="section-subheading text-muted">Αν έχετε οποιαδήποτε ερώτηση ή παρατήρηση μπορείτε να μας στείλετε μήνυμα και θα χαρούμε να επικοινωνήσουμε μαζί σας το συντομότερο δυνατόν.<br></h3>
                </div>

    <form id="fcf-form-id" class="fcf-form-class" action="https://developers.cloudflare.com/workers/tutorials/handle-form-submissions-with-airtable" method="POST"> <!-- follow instructions in https://developers.cloudflare.com/workers/tutorials/handle-form-submissions-with-airtable/ -->
        
        <div class="fcf-form-group">
            <!-- <label for="full_name" class="fcf-label">Το ονοματεπώνυμό σας *</label> -->
            <div class="fcf-input-group">
                <input type="text" id="full_name" placeholder="Ονοματεπώνυμο *" name="full_name" class="fcf-form-control" required>
            </div>
        </div>

        <div class="fcf-form-group">

            <div class="fcf-input-group">
                <input type="email" id="email" placeholder="Διεύθυνση email *"  name="email" class="fcf-form-control" required>
            </div>
        </div>
        <div class="fcf-form-group">

            <div class="fcf-input-group">
                <input type="tel" id="phone" placeholder="Αριθμός τηλεφώνου" name="phone" class="fcf-form-control" >
            </div>
        </div>
   <!--         <div class="fcf-form-group">
            <label for="subject" class="fcf-label">Θέμα μηνύματος</label>
            <div class="fcf-input-group">
                <input type="text" id="subject" name="subject" class="fcf-form-control" required>
            </div>
        </div> -->

        <div class="fcf-form-group">

            <div class="fcf-input-group">
                <textarea id="message" name="message" placeholder="Το μήνυμά σας *" class="fcf-form-control" rows="6" maxlength="500" required></textarea>
            </div>
        </div>

        <div class="fcf-form-group">
            <button type="submit" id="fcf-button" class="fcf-btn fcf-btn-primary fcf-btn-lg fcf-btn-block">Υποβολή</button>
        </div>

       <div class="fcf-credit" id="fcf-credit">
        Τα πεδία με αστερίσκο είναι υποχρεωτικά.
        </div>

    </form>
    </div>

</div>

</body>
